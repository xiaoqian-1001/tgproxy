<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小钱免费TG代理 - 极速连接集群</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========== iOS 26 风格变量 ========== */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.88);
            --text-primary: #1d1c1f;
            --text-secondary: #6c6c70;
            --text-tertiary: #8e8e93;
            --border-color: rgba(224, 224, 230, 0.6);
            --accent-color: #007aff;
            --accent-hover: #005fc1;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --result-bg: rgba(0, 122, 255, 0.08);
            --tag-bg: #e9e9ef;
            --filter-active: #007aff;
            --filter-inactive: #e9e9ef;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --blur-bg: saturate(180%) blur(20px);
            --tg-blue: #0088cc;
        }

        .dark {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.88);
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --text-tertiary: #6c6c70;
            --border-color: rgba(56, 56, 62, 0.8);
            --accent-color: #0a84ff;
            --accent-hover: #409cff;
            --glass-bg: rgba(28, 28, 30, 0.78);
            --result-bg: rgba(10, 132, 255, 0.12);
            --tag-bg: #2c2c2e;
            --filter-active: #0a84ff;
            --filter-inactive: #2c2c2e;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', system-ui, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
            padding: 48px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景光晕效果 - 保留但增强毛玻璃感 */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 136, 204, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: move 20s infinite alternate;
            pointer-events: none;
        }

        .dark .bg-glow {
            background: radial-gradient(circle, rgba(0, 136, 204, 0.08) 0%, transparent 70%);
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(40%, 40%); }
        }

        /* 全局毛玻璃遮罩 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            z-index: -1;
            pointer-events: none;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 头像/图标区域 */
        .icon-wrapper {
            display: inline-block;
            padding: 20px;
            border-radius: 48px;
            background: var(--result-bg);
            border: 0.5px solid var(--border-color);
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .icon-wrapper i {
            font-size: 56px;
            color: var(--tg-blue);
        }

        /* 渐变标题 */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0088cc, #00fbff, #007aff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 毛玻璃主卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-radius: 40px;
            padding: 28px 24px;
            border: 0.5px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 0.5px solid var(--border-color);
        }

        .status-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }

        .status-online {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .status-text {
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--accent-color);
        }

        /* 代理节点列表 */
        .proxy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 节点卡片 */
        .proxy-node {
            background: var(--result-bg);
            border-radius: 20px;
            padding: 16px;
            border: 0.5px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .proxy-node:hover {
            transform: translateY(-2px);
            background: var(--card-bg);
            box-shadow: var(--shadow-sm);
            border-color: var(--accent-color);
        }

        .proxy-node:active {
            transform: scale(0.98);
        }

        .node-info {
            flex: 1;
            min-width: 0;
        }

        .node-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .node-index {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-tertiary);
            font-family: monospace;
            letter-spacing: -0.5px;
        }

        .node-auth {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 40px;
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            font-weight: 600;
        }

        .dark .node-auth {
            background: rgba(52, 199, 89, 0.2);
        }

        .node-address {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: monospace;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .node-type {
            font-size: 0.6rem;
            color: var(--text-tertiary);
        }

        .node-icon {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--tg-blue), #0a84ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .proxy-node:hover .node-icon {
            transform: scale(1.05);
        }

        .node-icon i {
            font-size: 1rem;
        }

        /* 底部特性栏 */
        .features {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-around;
        }

        .feature-item {
            text-align: center;
        }

        .feature-item p {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: 0.3px;
        }

        /* 底部提示 */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* 主题切换按钮 */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            border: 0.5px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .theme-btn:hover {
            transform: scale(1.05);
            background: var(--tag-bg);
        }

        /* Toast 提示 - iOS 风格 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            padding: 12px 24px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: var(--shadow-md);
            border: 0.5px solid var(--border-color);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            color: var(--text-primary);
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-message i {
            color: #34c759;
            font-size: 1rem;
        }

        /* 响应式 */
        @media (max-width: 560px) {
            body {
                padding: 32px 16px;
            }
            h1 {
                font-size: 1.7rem;
            }
            .glass-card {
                padding: 20px 16px;
                border-radius: 32px;
            }
            .proxy-node {
                padding: 12px;
            }
            .node-address {
                font-size: 0.75rem;
            }
            .node-icon {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景光晕 -->
    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px; animation-delay: -5s;"></div>

    <!-- 主题切换按钮 -->
    <button id="themeBtn" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="main-container">
        <div class="text-center mb-8">
            <div class="icon-wrapper">
                <i class="fab fa-telegram-plane"></i>
            </div>
            <h1>小钱免费TG代理</h1>
            <p class="subtitle">Quantum Speed Cluster · 隐私高速</p>
        </div>

        <div class="glass-card">
            <div class="status-bar">
                <span class="status-label">Cluster Nodes</span>
                <div class="status-online">
                    <span class="online-dot"></span>
                    <span class="status-text">⚡ 一键直连</span>
                </div>
            </div>

            <div class="proxy-list" id="proxyList"></div>

            <div class="features">
                <div class="feature-item">
                    <p>🛡️ SSL 加密</p>
                </div>
                <div class="feature-item">
                    <p>⚖️ 多线负载</p>
                </div>
                <div class="feature-item">
                    <p>🚀 即点即连</p>
                </div>
            </div>
        </div>

        <div class="footer-note">
            <i class="fas fa-hand-pointer"></i> 点击任意节点 · 自动复制配置并跳转 Telegram
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast-message">
        <i class="fas fa-check-circle"></i>
        <span>代理链接已复制，正在启动 Telegram...</span>
    </div>

    <script>
        // 代理列表
        const proxies = [
            "tg://socks?server=45.192.200.9&port=5555&user=hanbaocloud&pass=hanbaocloud",
            "tg://socks?server=47.254.240.76&port=5555&user=socks5&pass=socks5",
            "tg://socks?server=47.239.202.242&port=6666&user=6666&pass=6666",
            "tg://socks?server=43.100.106.246&port=2222&user=2222&pass=2222",
            "tg://socks?server=47.83.174.84&port=6666&user=6666&pass=6666",
            "tg://socks?server=47.83.186.60&port=5555&user=5555&pass=5555",
            "tg://socks?server=47.83.8.104&port=6666&user=6666&pass=6666",
            "tg://socks?server=43.100.106.218&port=2222&user=2222&pass=2222",
            "tg://socks?server=47.83.1.61&port=5555&user=5555&pass=5555",
            "tg://socks?server=47.83.186.60&port=5555&user=5555&pass=5555"
        ];

        // 去重
        function getUniqueProxies() {
            const map = new Map();
            proxies.forEach(url => {
                const params = new URLSearchParams(url.split('?')[1]);
                const key = `${params.get('server')}:${params.get('port')}`;
                if (!map.has(key)) map.set(key, url);
            });
            return Array.from(map.values());
        }

        // 渲染节点列表
        function renderNodes() {
            const container = document.getElementById('proxyList');
            const uniqueProxies = getUniqueProxies();
            
            container.innerHTML = uniqueProxies.map((url, idx) => {
                const params = new URLSearchParams(url.split('?')[1]);
                const server = params.get('server') || 'unknown';
                const port = params.get('port') || '1080';
                const hasAuth = params.get('user');
                const authBadge = hasAuth ? '🔐 认证' : '免认证';
                
                return `
                    <div class="proxy-node" data-url="${escapeHtml(url)}">
                        <div class="node-info">
                            <div class="node-badge">
                                <span class="node-index">节点 ${String(idx + 1).padStart(2, '0')}</span>
                                <span class="node-auth">${escapeHtml(authBadge)}</span>
                            </div>
                            <div class="node-address">${escapeHtml(server)}:${escapeHtml(port)}</div>
                            <div class="node-type">Socks5 · 低延迟集群</div>
                        </div>
                        <div class="node-icon">
                            <i class="fas fa-bolt"></i>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 绑定点击事件
            document.querySelectorAll('.proxy-node').forEach(node => {
                node.addEventListener('click', () => {
                    const url = node.getAttribute('data-url');
                    if (url) connect(url);
                });
            });
        }

        // 连接函数
        function connect(url) {
            // 复制到剪贴板
            navigator.clipboard.writeText(url).catch(() => {});
            
            // 显示 Toast
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                // 跳转到 Telegram
                window.location.href = url;
            }, 500);
        }

        // HTML 转义
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;'
            }[m] || m));
        }

        // 主题切换
        function initTheme() {
            const savedTheme = localStorage.getItem('xiaoqian_tg_theme');
            const html = document.documentElement;
            
            if (savedTheme === 'dark') {
                html.classList.add('dark');
            } else if (savedTheme === 'light') {
                html.classList.remove('dark');
            } else {
                // 跟随系统
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    html.classList.add('dark');
                }
            }
            updateThemeIcon();
        }
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const btn = document.getElementById('themeBtn');
            if (btn) {
                btn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('xiaoqian_tg_theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('xiaoqian_tg_theme', 'dark');
            }
            updateThemeIcon();
        }
        
        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            const saved = localStorage.getItem('xiaoqian_tg_theme');
            if (!saved) {
                if (e.matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                updateThemeIcon();
            }
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            renderNodes();
            initTheme();
            
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.addEventListener('click', toggleTheme);
            }
        });
    </script>
</body>
</html>
