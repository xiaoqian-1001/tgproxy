<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小钱免费TG代理 - 极速连接集群</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tgblue: '#0088cc',
                        tgalternate: '#00fbff',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --transition-speed: 0.5s; }
        body { 
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow-x: hidden;
            /* 移除顶部跑马灯的内边距 */
            padding-top: 0;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 完全移除跑马灯相关样式，无广告条 */

        /* 无音乐控制器样式，彻底移除 */

        /* 原有 UI 样式 - 微调 */
        .bg-glow {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 136, 204, 0.2) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px); z-index: 0;
            animation: move 20s infinite alternate; pointer-events: none;
        }
        @keyframes move { 0% { transform: translate(-20%, -20%); } 100% { transform: translate(40%, 40%); } }
        .glass-card {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .proxy-node { transition: all 0.3s ease; }
        .proxy-node:hover { transform: scale(1.02); background: rgba(0, 136, 204, 0.1); }
        
        /* 简易提示toast */
        .toast-message {
            transition: all 0.25s ease;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen py-12 px-6 flex flex-col items-center">
    
    <!-- 跑马灯广告已彻底移除 -->
    <!-- 音乐 audio 标签及音乐控件完全移除 -->

    <div class="bg-glow"></div>

    <button id="theme-toggle" onclick="toggleTheme()" class="fixed top-6 right-6 z-50 w-12 h-12 rounded-full bg-white/20 dark:bg-black/20 border border-slate-200 dark:border-white/10 flex items-center justify-center shadow-lg hover:scale-110 active:scale-90 transition-all backdrop-blur-sm">
        <i class="fas fa-sun text-yellow-400 text-xl hidden dark:block"></i>
        <i class="fas fa-moon text-blue-400 text-xl dark:hidden"></i>
    </button>

    <div class="relative z-10 w-full max-w-xl">
        <div class="text-center mb-10">
            <div class="inline-block p-5 rounded-[2.5rem] bg-tgblue/10 dark:bg-white/5 mb-4 ring-1 ring-tgblue/20 dark:ring-white/10 shadow-xl">
                <i class="fab fa-telegram-plane text-5xl text-tgblue animate-bounce"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2 bg-gradient-to-r from-tgblue to-cyan-400 bg-clip-text text-transparent">小钱免费TG代理</h1>
            <p class="text-slate-500 dark:text-slate-400 text-xs tracking-[0.3em] uppercase font-bold">Quantum Speed Cluster · 隐私高速</p>
        </div>

        <div class="glass-card bg-white/70 dark:bg-white/5 rounded-[3rem] p-6 md:p-10 border border-white/20 dark:border-white/10 shadow-2xl">
            <div class="flex items-center justify-between mb-8 px-2">
                <div class="text-left">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Cluster Nodes</p>
                    <p class="text-emerald-500 font-bold flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        ⚡一键直连
                    </p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Status</p>
                    <p class="font-black text-tgblue uppercase text-sm italic">✅在线代理 · 11条高速链路</p>
                </div>
            </div>

            <div class="space-y-4" id="proxy-list"></div>

            <div class="mt-10 pt-8 border-t border-slate-200 dark:border-white/5 flex justify-around opacity-50">
                <div class="text-center"><p class="text-[9px] font-bold">🛡️ SSL 加密</p></div>
                <div class="text-center"><p class="text-[9px] font-bold">⚖️ 多线负载</p></div>
                <div class="text-center"><p class="text-[9px] font-bold">🚀 即点即连</p></div>
            </div>
        </div>
        <div class="text-center mt-6 text-xs text-slate-400 dark:text-slate-500">
            点击任意节点 | 自动复制配置并跳转Telegram
        </div>
    </div>

    <!-- 完全移除音乐控件DOM -->
    
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-300 pointer-events-none translate-y-10 z-[999] toast-message">
        <div class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 font-bold text-sm">
            <i class="fas fa-check-circle text-emerald-500 text-base"></i>
            <span>代理链接已复制，正在启动 Telegram ...</span>
        </div>
    </div>

    <script>
        // 原始代理列表（高质量socks5代理，适用于Telegram）
        const proxies = [
            "tg://socks?server=45.192.200.9&port=5555&user=hanbaocloud&pass=hanbaocloud",
            "tg://socks?server=47.254.240.76&port=5555&user=socks5&pass=socks5",
            "tg://socks?server=47.239.202.242&port=6666&user=6666&pass=6666",
            "tg://socks?server=43.100.106.246&port=2222&user=2222&pass=2222",
            "tg://socks?server=47.83.174.84&port=6666&user=6666&pass=6666",
            "tg://socks?server=47.83.186.60&port=5555&user=5555&pass=5555",
            "tg://socks?server=47.83.8.104&port=6666&user=6666&pass=6666",
            "tg://socks?server=43.100.106.218&port=2222&user=2222&pass=2222",
            "tg://socks?server=47.83.1.61&port=5555&user=5555&pass=5555",
            "tg://socks?server=47.83.174.84&port=6666&user=6666&pass=6666",
            "tg://socks?server=47.83.186.60&port=5555&user=5555&pass=5555"
        ];

        // 去重优化展示 (保留原样，但确保UI干净)
        function renderNodes() {
            const list = document.getElementById('proxy-list');
            // 显示所有节点，部分地址可能重复但保留原配置完整性
            const uniqueMap = new Map();
            proxies.forEach(url => {
                const params = new URLSearchParams(url.split('?')[1]);
                const key = `${params.get('server')}:${params.get('port')}`;
                if (!uniqueMap.has(key)) uniqueMap.set(key, url);
            });
            const finalProxies = Array.from(uniqueMap.values());
            // 保持最多11个，如果去重后少于原数量不影响
            list.innerHTML = finalProxies.map((url, idx) => {
                const params = new URLSearchParams(url.split('?')[1]);
                const server = params.get('server') || 'unknown';
                const port = params.get('port') || '1080';
                const userPart = params.get('user') ? `🔐 认证` : `免认证`;
                return `
                    <div class="proxy-node bg-slate-100/50 dark:bg-black/30 rounded-2xl p-4 border border-slate-200 dark:border-white/5 flex items-center justify-between group cursor-pointer" onclick="connect('${url.replace(/'/g, "\\'")}')">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] text-slate-400 font-mono font-bold uppercase tracking-tighter">节点 0${idx+1}</span>
                                <span class="text-[8px] px-1.5 py-0.5 rounded-full bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 font-bold">${userPart}</span>
                            </div>
                            <p class="text-base font-mono font-bold truncate text-slate-700 dark:text-cyan-200">${server}:${port}</p>
                            <p class="text-[10px] text-slate-400 mt-0.5 hidden sm:block">Socks5 · 低延迟集群</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-tgblue to-blue-600 text-white flex items-center justify-center shadow-lg shadow-tgblue/20 group-hover:scale-110 transition-transform">
                            <i class="fas fa-bolt text-xs"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 连接函数：复制配置并跳转TG
        function connect(url) {
            // 复制完整的代理链接
            navigator.clipboard.writeText(url).catch(() => {});
            const toast = document.getElementById('toast');
            // 显示提示
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                // 尝试唤起 Telegram 客户端
                window.location.href = url;
            }, 500);
        }

        // 主题切换函数
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('xiaoqian_tg_theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('xiaoqian_tg_theme', 'dark');
            }
            // 手动更新按钮图标样式（方便）
            updateThemeIcon();
        }
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const sunIcon = document.querySelector('#theme-toggle .fa-sun');
            const moonIcon = document.querySelector('#theme-toggle .fa-moon');
            if (sunIcon && moonIcon) {
                if (isDark) {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                } else {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                }
            }
        }
        
        // 初始化主题偏好
        function initTheme() {
            const savedTheme = localStorage.getItem('xiaoqian_tg_theme');
            const html = document.documentElement;
            if (savedTheme === 'light') {
                html.classList.remove('dark');
            } else if (savedTheme === 'dark') {
                html.classList.add('dark');
            } else {
                // 跟随系统prefers-color-scheme
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
            }
            updateThemeIcon();
        }
        
        // 移除所有音乐相关初始化，没有音频元素
        // 确保页面加载后不弹出任何音乐请求
        
        // 额外添加一种优雅的交互: 告知用户代理已可用
        window.addEventListener('DOMContentLoaded', function() {
            renderNodes();
            initTheme();
            
            // 可选：显示一个轻量提示小钱代理集群已就绪 (无音乐)
            console.log('小钱免费TG代理已启动 | 纯净极速版');
            
            // 不在页面加载时请求任何音频权限
        });
        
        // 暴露全局connect, toggleTheme便于内联调用
        window.connect = connect;
        window.toggleTheme = toggleTheme;
    </script>
</body>
</html>
